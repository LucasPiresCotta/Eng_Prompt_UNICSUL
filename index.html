<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List</title>

    <!-- Arquivo de estilos externo -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>

    <!-- Container principal que centraliza todo o conteúdo -->
    <div class="container">

      <!-- Cabeçalho da aplicação -->
      <header class="header">
        <h1>Minhas Tarefas</h1>
        <p class="subtitle">Organize o que precisa ser feito</p>
      </header>

      <!-- ==========================================
           SEÇÃO DE ADIÇÃO DE TAREFA
           Agrupa: input de texto, select de prioridade
           e o botão de confirmação.
      =========================================== -->
      <section class="add-section" aria-label="Adicionar nova tarefa">

        <!-- INPUT: campo de texto para nome da tarefa -->
        <input
          type="text"
          id="task-input"
          class="task-input"
          placeholder="Digite uma nova tarefa..."
          maxlength="100"
          aria-label="Nome da tarefa"
        />

        <!-- SELECT: nível de prioridade da tarefa -->
        <select
          id="priority-select"
          class="priority-select"
          aria-label="Nível de prioridade"
        >
          <option value="" disabled selected>Prioridade</option>
          <!-- Alta: tarefas urgentes ou críticas -->
          <option value="alta">🔴 Alta</option>
          <!-- Média: importantes mas não urgentes -->
          <option value="media">🟡 Média</option>
          <!-- Baixa: tarefas sem urgência -->
          <option value="baixa">🟢 Baixa</option>
        </select>

        <!-- BOTÃO: confirma a adição da tarefa -->
        <button
          type="button"
          id="add-btn"
          class="add-btn"
          aria-label="Adicionar tarefa"
        >
          + Adicionar
        </button>

      </section>

      <!-- Botões para filtrar tarefas por estado -->
      <nav class="filters" aria-label="Filtrar tarefas">
        <button type="button" class="filter-btn active" data-filter="todas">Todas</button>
        <button type="button" class="filter-btn" data-filter="pendentes">Pendentes</button>
        <button type="button" class="filter-btn" data-filter="concluidas">Concluídas</button>
      </nav>

      <!-- ==========================================
           LISTA DE TAREFAS (ul)
           Populada dinamicamente pelo JavaScript.
           Cada <li> representa uma tarefa.
      =========================================== -->
      <ul id="task-list" class="task-list" role="list" aria-label="Lista de tarefas">

        <!-- Exemplo estático de item — será gerado pelo JS em produção -->
        <!-- Estrutura de cada item:
               1. checkbox  → marca conclusão
               2. label     → texto da tarefa
               3. .badge    → nível de prioridade
               4. .del-btn  → botão de excluir
        -->
        <li class="task-item" data-priority="alta">
          <input type="checkbox" class="task-checkbox" id="task-ex" />
          <label for="task-ex" class="task-label">Exemplo: Entregar TCC</label>
          <span class="badge badge-alta">🔴 Alta</span>
          <button type="button" class="del-btn" aria-label="Excluir tarefa">✕</button>
        </li>

      </ul>

      <!-- Rodapé: contador de pendentes + limpar concluídas -->
      <footer class="task-footer">
        <span id="task-counter" class="counter">1 tarefa pendente</span>
        <button type="button" id="clear-btn" class="clear-btn">Limpar concluídas</button>
      </footer>

    </div>
    <!-- /container -->

    <!-- Script JS linkado no final para garantir que o HTML foi carregado -->
    <script src="script.js"></script>

  </body>
</html>
